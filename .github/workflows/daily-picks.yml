name: Daily Picks

# Runs the production pipeline twice a day, sized to actually catch real
# market state (not 7am opener junk):
#
#   15:00 UTC = 11:00 AM ET (EDT) — early-day slate.
#     By this hour: probable pitchers all announced, lineups posting for
#     1pm ET first pitches, books have priced most/all 15 games (vs ~4 at
#     7am), and morning opener mispricings have been hit by sharps so
#     prices reflect real market state.
#
#   19:00 UTC = 3:00 PM ET (EDT) — evening slate refresh.
#     Catches lineups for 4pm and 7pm ET first pitches as they post, plus
#     any odds that moved during the afternoon. The 1pm games will already
#     be in progress — the recommend script's --pre-game-only flag drops
#     those automatically without erroring.
#
# Manual workflow_dispatch is also supported (Actions tab → Run workflow)
# for ad-hoc reruns or backfills.
on:
  schedule:
    - cron: '0 15 * * *'   # 11 AM ET — early-day games (lineups posting, books all priced)
    - cron: '0 19 * * *'   # 3 PM ET — evening refresh (4pm + 7pm lineup confirms)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''

permissions:
  contents: write   # needed to commit results back to the production branch
  pages: write
  id-token: write

concurrency:
  # Don't let two runs of the same day stomp on each other (e.g. cron + manual).
  group: daily-picks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
      MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
      DIGEST_TO: ${{ secrets.DIGEST_TO }}
      DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
      TZ: America/New_York

    steps:
      - name: Check out production branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set target date
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "date=${{ github.event.inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-production.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-production.txt
          pip install -e .

      - name: Verify model + features are present
        # Fail at step 1 if any score_today input is missing — better than
        # waiting until score_today blows up 90 seconds later.
        run: |
          for f in \
            models/xgb_v3.joblib \
            models/xgb_v3_recal.joblib \
            data/modeling/player_game_features.parquet \
            data/clean/batter_season_stats.parquet \
            data/clean/pitcher_season_stats.parquet \
            data/clean/batter_rolling.parquet \
            data/clean/pitcher_rolling.parquet \
            data/clean/players.parquet \
            data/clean/bullpen_features.parquet \
            data/clean/boxscores_2026.parquet \
            data/clean/game_starters_2026.parquet \
            config/stadiums.csv ; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done

      - name: Fetch today's schedule
        run: python -m mlbhit.pipeline.fetch_schedule --date ${{ steps.target.outputs.date }}

      - name: Fetch probable starters
        run: python -m mlbhit.pipeline.fetch_game_starters --season 2026

      - name: Fetch lineups
        run: python -m mlbhit.pipeline.fetch_lineups --date ${{ steps.target.outputs.date }}

      - name: Score the slate
        run: |
          python -m mlbhit.pipeline.score_today \
            --date ${{ steps.target.outputs.date }} \
            --season 2026 \
            --prior-season 2025

      - name: Fetch prop odds
        run: |
          python -m mlbhit.pipeline.fetch_prop_odds \
            --date ${{ steps.target.outputs.date }} \
            --source theodds

      - name: Generate Filter E recommendations
        # --pre-game-only: if any games on the target date have already
        # started (cron drifted late, or someone manually triggered
        # mid-day), filter to only the games still pre-first-pitch
        # rather than refusing the whole slate. Safe no-op when every
        # game is still pre-game (which is the normal cron case at 11 UTC).
        run: |
          python -m mlbhit.pipeline.recommend \
            --date ${{ steps.target.outputs.date }} \
            --filter-e \
            --require-pitcher \
            --pre-game-only

      - name: Build digest payload
        id: digest
        run: |
          python scripts/build_digest.py \
            --date ${{ steps.target.outputs.date }} \
            --out digest.html \
            --out-text digest.txt
          {
            echo 'subject<<EOF'
            head -n 1 digest.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send email digest
        if: env.MAILGUN_API_KEY != '' && env.DIGEST_TO != ''
        run: |
          python scripts/send_digest.py \
            --to "$DIGEST_TO" \
            --from "$DIGEST_FROM" \
            --subject "${{ steps.digest.outputs.subject }}" \
            --html digest.html \
            --attach data/output/recommendations/${{ steps.target.outputs.date }}_filter_e.csv

      - name: Refresh boxscores cache (yesterday's results)
        # --update is incremental: reads the existing boxscores_2026.parquet,
        # finds its most recent date, and only fetches the gap to yesterday.
        # On a fresh runner with the parquet shipped through the prior day's
        # data, this is ~1 day = ~5 sec, vs the ~25 min full-season rebuild
        # we'd hit otherwise.
        run: python -m mlbhit.pipeline.fetch_boxscores --season 2026 --update

      - name: Grade past Filter E recommendations
        # In-place adds outcome/pnl columns to each historical CSV so the
        # dashboard can render ✓/✗ and P&L. Skips today (games not settled).
        run: python scripts/grade_picks.py

      - name: Refresh dashboard manifest
        run: python scripts/build_dashboard_manifest.py

      - name: Commit results back
        run: |
          git config user.name  "mlbhit-bot"
          git config user.email "mlbhit-bot@users.noreply.github.com"
          git add data/output/recommendations/ data/output/dropped/ docs/manifest.json docs/recommendations/ docs/dropped/ data/clean/boxscores_2026.parquet
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            git commit -m "picks: ${{ steps.target.outputs.date }} (auto)"
            git push
          fi

      - name: Upload run artifacts (CSV + log)
        uses: actions/upload-artifact@v4
        with:
          name: picks-${{ steps.target.outputs.date }}
          path: |
            data/output/recommendations/${{ steps.target.outputs.date }}*.csv
            digest.html
          if-no-files-found: warn
          retention-days: 30
