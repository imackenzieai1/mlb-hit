<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MLB Picks" />
  <title>MLB Picks</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #131c30;
      --row: #1a2640;
      --row-alt: #16203a;
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #4ade80;
      --negative: #f87171;
      --border: #243049;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --row: #ffffff;
        --row-alt: #f3f4f8;
        --text: #1a1f2e;
        --muted: #5b6478;
        --accent: #16a34a;
        --negative: #dc2626;
        --border: #e2e6ee;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 96px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 16px;
    }
    select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      padding: 8px 10px;
    }
    .summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .summary div span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .summary div strong {
      font-size: 18px;
      font-weight: 600;
    }
    .row {
      background: var(--row);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .row:nth-child(even) { background: var(--row-alt); }
    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }
    .name {
      font-weight: 600;
      font-size: 16px;
    }
    .price {
      font-variant-numeric: tabular-nums;
      font-size: 15px;
      color: var(--muted);
    }
    .row-bot {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    /* First-pitch tag — small chip next to the team line so the user can see
       at a glance whether a pick is about to lock vs hours away. */
    .pitch-time {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .edge {
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .edge.neg { color: var(--negative); }
    /* Outcome badge: ✓ for hit, ✗ for miss, ◦ for void/postponed.
       Sized to match player-name baseline so the row stays single-line. */
    .badge {
      display: inline-block;
      width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
      vertical-align: middle;
    }
    .badge.hit  { background: var(--accent);   color: white; }
    .badge.miss { background: var(--negative); color: white; }
    .badge.void { background: var(--muted);    color: white; }
    /* Hot-streak indicator: a small flame next to the player name when the
       batter hit > .300 across his last 6 PA-counted games. Independent of
       outcome (a hot bat can still miss). The recommendation is 2u stake. */
    .hot-flag {
      display: inline-block;
      margin-left: 4px;
      font-size: 13px;
      vertical-align: middle;
    }
    .units-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(74, 222, 128, 0.12);
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .pnl {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      margin-left: 8px;
    }
    .pnl.pos { color: var(--accent); }
    .pnl.neg { color: var(--negative); }
    .pnl.zero { color: var(--muted); }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 12px;
    }
    a.refresh {
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }
    a.refresh:hover { color: var(--text); }
    /* Footer legend explaining the 🔥 and ⚙️ flags. Stacked rows so the
       emoji sits flush left and the text wraps cleanly on narrow viewports. */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .legend-row { display: block; }
    /* Refresh-picks button: deep-links to the workflow's "Run workflow"
       page on github.com. From there it's two taps to trigger a re-run.
       Static pages can't dispatch GitHub Actions directly without putting
       a token in the page (insecure), so the deep-link is the cleanest path. */
    a.run-button {
      display: inline-block;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    a.run-button:hover { opacity: 0.9; }
    /* Dropped-picks section: collapsible block underneath the main rows.
       Shown only when a dropped CSV exists for the selected date.
       Lets the user inspect "what would have been picked at the morning run
       but isn't anymore" without polluting the main slate. */
    details.dropped {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 12px;
    }
    details.dropped summary {
      padding: 8px 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      list-style: none;
    }
    details.dropped summary::-webkit-details-marker { display: none; }
    details.dropped summary::before {
      content: "▸ ";
      display: inline-block;
      transition: transform 0.15s;
    }
    details.dropped[open] summary::before { content: "▾ "; }
    details.dropped .dropped-row {
      background: var(--row);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin: 8px 0;
      opacity: 0.85;
    }
    details.dropped .dropped-row:nth-child(even) { background: var(--row-alt); }
    details.dropped .reason {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MLB Picks</h1>
      <select id="datePicker" aria-label="Pick a date"></select>
    </header>
    <p class="meta" id="meta">loading…</p>
    <a class="run-button"
       href="https://github.com/imackenzieai1/mlb-hit/actions/workflows/daily-picks.yml"
       target="_blank"
       rel="noopener">⚡ Refresh picks (run workflow)</a>
    <div class="summary" id="summary" hidden></div>
    <div id="rows"></div>
    <details class="dropped" id="droppedBlock" hidden>
      <summary id="droppedSummary">Dropped picks (0)</summary>
      <div id="droppedRows"></div>
    </details>
    <p class="meta legend" style="margin-top:24px">
      <span class="legend-row"><span class="hot-flag">🔥</span> Hot bat — BA &gt; .300 over last 6 PA-counted games (2u sizing).</span>
      <span class="legend-row"><span class="hot-flag">⚙️</span> Opponent grind — opp has played 11+ consecutive calendar-day games (bullpen fatigue signal).</span>
    </p>
    <p class="meta" style="margin-top:8px">
      <a class="refresh" href="javascript:location.reload()">↻ reload page</a>
    </p>
  </div>

  <script>
    // The dashboard reads the same files the workflow commits — no API calls,
    // so it works for guests with no rate limit. Manifest is rebuilt each run.
    const MANIFEST_URL = "manifest.json";
    // CSVs are mirrored from data/output/recommendations/ into docs/recommendations/
    // by build_dashboard_manifest.py, because GitHub Pages serves only /docs.
    const csvUrlForDate = (d) => `recommendations/${d}_filter_e.csv`;
    // Dropped-picks CSVs (mirrored from data/output/dropped/). Filename convention
    // is just {date}.csv — no _filter_e suffix because every dropped pick by
    // definition came from the production filter_e file.
    const droppedCsvUrlForDate = (d) => `dropped/${d}.csv`;
    // Dates that have a dropped CSV — populated from the manifest in init().
    let DROPPED_DATES = new Set();

    function fmtPct(x) {
      const v = parseFloat(x);
      if (!isFinite(v)) return "";
      return (v * 100).toFixed(1) + "%";
    }
    function fmtPrice(x) {
      const v = parseInt(x, 10);
      if (!isFinite(v)) return "";
      return v > 0 ? `+${v}` : `${v}`;
    }
    function csvSplit(line) {
      // Minimal CSV parser: handles quoted fields with embedded commas.
      const out = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (inQ) {
          if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
          else if (c === '"') { inQ = false; }
          else { cur += c; }
        } else {
          if (c === ",") { out.push(cur); cur = ""; }
          else if (c === '"') { inQ = true; }
          else { cur += c; }
        }
      }
      out.push(cur);
      return out;
    }
    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (!lines.length) return { header: [], rows: [] };
      const header = csvSplit(lines[0]);
      const rows = lines.slice(1).map((l) => {
        const cells = csvSplit(l);
        return Object.fromEntries(header.map((h, i) => [h, cells[i] ?? ""]));
      });
      return { header, rows };
    }
    function pick(row, names) {
      for (const n of names) {
        if (row[n] !== undefined && row[n] !== "") return row[n];
      }
      return "";
    }
    // Render an outcome badge ("hit"/"miss"/"void") to the left of the
    // player name. Empty outcome = pending (today or today's not-yet-final);
    // we render no badge in that case so the row reads as pre-game.
    function badgeFor(outcome) {
      if (outcome === "hit")  return `<span class="badge hit"  title="Hit">✓</span>`;
      if (outcome === "miss") return `<span class="badge miss" title="Miss">✗</span>`;
      if (outcome === "void") return `<span class="badge void" title="Voided (postponed / scratched / no PA)">◦</span>`;
      return "";
    }
    function fmtPnl(p) {
      const v = parseFloat(p);
      if (!isFinite(v) || v === 0) return "";
      const cls = v > 0 ? "pos" : "neg";
      const s = v > 0 ? `+$${v.toFixed(2)}` : `-$${Math.abs(v).toFixed(2)}`;
      return `<span class="pnl ${cls}">${s}</span>`;
    }
    function render(date, rows) {
      document.getElementById("meta").textContent =
        `${date} · ${rows.length} bet${rows.length === 1 ? "" : "s"}`;
      const sum = document.getElementById("summary");
      const rowsEl = document.getElementById("rows");
      if (!rows.length) {
        sum.hidden = true;
        rowsEl.innerHTML = `<div class="empty">No bets cleared Filter E.</div>`;
        return;
      }
      const edges = rows.map((r) => parseFloat(r.edge)).filter(isFinite);
      const prices = rows.map((r) => parseInt(r.over_price, 10)).filter(isFinite);
      const avgEdge = edges.reduce((a, b) => a + b, 0) / Math.max(1, edges.length);
      const avgPrice = prices.reduce((a, b) => a + b, 0) / Math.max(1, prices.length);

      // Detect graded rows: any row whose `outcome` is hit/miss/void counts
      // as scored. We compute day totals only when grading is present, so
      // today's pre-game slate doesn't show a misleading "0 of 5 won".
      const gradedRows = rows.filter((r) =>
        r.outcome === "hit" || r.outcome === "miss" || r.outcome === "void"
      );
      const isGraded = gradedRows.length > 0;
      const liveBets = gradedRows.filter((r) => r.outcome !== "void"); // void = book voided
      const hits = liveBets.filter((r) => r.outcome === "hit").length;
      // Day P&L at flat $1: sum of `pnl`. Day P&L with recommended sizing:
      // sum of `pnl_weighted` (which grade_picks.py writes as pnl * units).
      // The dashboard prefers the weighted view since 2u sizing on hot bats
      // is the validated policy (cohort backtest 2026-04-27).
      const dayPnlFlat = gradedRows
        .map((r) => parseFloat(r.pnl))
        .filter(isFinite)
        .reduce((a, b) => a + b, 0);
      const dayPnlWeighted = gradedRows
        .map((r) => {
          const w = parseFloat(r.pnl_weighted);
          return isFinite(w) ? w : parseFloat(r.pnl);
        })
        .filter(isFinite)
        .reduce((a, b) => a + b, 0);
      // How many bets at 2u? Used in the summary to surface the sizing mix.
      const hotCount = rows.filter((r) =>
        String(r.hot_streak || "").trim() === "1"
      ).length;

      sum.hidden = false;
      const summaryCells = [
        `<div><span>Bets</span><strong>${rows.length}${
          hotCount ? ` <span style="font-size:13px;color:var(--accent);">(${hotCount}🔥@2u)</span>` : ""
        }</strong></div>`,
        `<div><span>Avg edge</span><strong>${(avgEdge * 100).toFixed(1)}%</strong></div>`,
        `<div><span>Avg price</span><strong>${avgPrice >= 0 ? "+" : ""}${avgPrice.toFixed(0)}</strong></div>`,
      ];
      if (isGraded && liveBets.length) {
        const hitRate = (hits / liveBets.length * 100).toFixed(0);
        const pnlCls = dayPnlWeighted > 0 ? "pos" : dayPnlWeighted < 0 ? "neg" : "zero";
        const pnlStr = dayPnlWeighted >= 0
          ? `+$${dayPnlWeighted.toFixed(2)}`
          : `-$${Math.abs(dayPnlWeighted).toFixed(2)}`;
        // Show flat baseline as a small subtitle so we can see the lift
        // 2u sizing actually delivered on this date.
        const flatStr = dayPnlFlat >= 0
          ? `+$${dayPnlFlat.toFixed(2)}`
          : `-$${Math.abs(dayPnlFlat).toFixed(2)}`;
        const showLift = Math.abs(dayPnlFlat - dayPnlWeighted) > 0.005;
        summaryCells.push(
          `<div><span>Day result</span><strong>${hits}/${liveBets.length} (${hitRate}%)</strong></div>`,
          `<div><span>Day P&L</span><strong class="pnl ${pnlCls}">${pnlStr}</strong>${
            showLift ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">(flat $1: ${flatStr})</div>` : ""
          }</div>`,
        );
      }
      sum.innerHTML = summaryCells.join("");

      rowsEl.innerHTML = rows.map((r) => {
        const name = pick(r, ["player_name", "player_name_x", "player_name_y", "name"]);
        const team = pick(r, ["team", "batter_team"]);
        const opp  = pick(r, ["opp_team", "opponent"]);
        const ha   = pick(r, ["home_away"]);
        const haSym = ha === "A" ? "@" : ha === "H" ? "vs" : "·";
        const edgeVal = parseFloat(r.edge);
        const edgeCls = isFinite(edgeVal) && edgeVal < 0 ? "edge neg" : "edge";
        const plat = String(pick(r, ["platoon_advantage"])) === "1" ? " · platoon" : "";
        const badge = badgeFor(String(r.outcome || "").trim());
        // Hot-streak indicator: only show 🔥 + 2u tag when batter cleared the
        // 6-game >.300 threshold. recent_form.attach_hot_streak guarantees
        // hot_streak=1 implies recommended_units=2.0, so they always co-occur.
        const isHot = String(r.hot_streak || "").trim() === "1";
        const hotHtml = isHot
          ? `<span class="hot-flag" title="Hit > .300 over last 6 games">🔥</span><span class="units-tag">2u</span>`
          : "";
        // Grind indicator (flag-only for now — n=35 in backtest, signal real
        // but undersized; we surface but don't size on it yet).
        const isGrind = String(r.opp_grind || "").trim() === "1";
        const grindHtml = isGrind
          ? `<span class="hot-flag" title="Opp on 11+ consecutive games (bullpen grind)">⚙️</span>`
          : "";
        // Use weighted pnl for the per-row display when present (it's what
        // we actually made at recommended sizing). Falls back to flat pnl
        // for rows graded before the weighted column existed.
        const pnlForDisplay = (r.pnl_weighted !== undefined && r.pnl_weighted !== "")
          ? r.pnl_weighted : r.pnl;
        const pnlHtml = fmtPnl(pnlForDisplay);
        // First-pitch ET label — surfaces game time so user can see "lock in
        // by 1:35pm vs evening pick at 7:05pm". Empty when schedule data
        // wasn't available at recommend-time (rare).
        // Prefer first_pitch_ct (post-2026-05-03 schema); fall back to
        // first_pitch_et for older CSVs that haven't been re-graded yet.
        const firstPitch = pick(r, ["first_pitch_ct", "first_pitch_et"]);
        const pitchHtml = firstPitch
          ? `<span class="pitch-time" title="First pitch time">${firstPitch}</span>`
          : "";
        return `
          <div class="row">
            <div class="row-top">
              <span class="name">${badge}${name || "—"}${hotHtml}${grindHtml}</span>
              <span class="price">${fmtPrice(r.over_price)}${pnlHtml}</span>
            </div>
            <div class="row-bot">
              <span>${team} ${haSym} ${opp}${plat}${pitchHtml}</span>
              <span class="${edgeCls}">${fmtPct(r.edge)} edge</span>
            </div>
          </div>
        `;
      }).join("");
    }
    function renderDropped(date, rows) {
      const block = document.getElementById("droppedBlock");
      const summary = document.getElementById("droppedSummary");
      const rowsEl = document.getElementById("droppedRows");
      if (!rows.length) {
        block.hidden = true;
        rowsEl.innerHTML = "";
        return;
      }
      block.hidden = false;
      summary.textContent = `Dropped picks (${rows.length})`;
      // Sort: most recently dropped first, falling back to game time.
      rows.sort((a, b) => {
        const aD = a.dropped_at || "";
        const bD = b.dropped_at || "";
        return aD < bD ? 1 : aD > bD ? -1 : 0;
      });
      rowsEl.innerHTML = rows.map((r) => {
        const name = pick(r, ["player_name", "player_name_x", "player_name_y", "name"]);
        const team = pick(r, ["team", "batter_team"]);
        const opp  = pick(r, ["opp_team", "opponent"]);
        const ha   = pick(r, ["home_away"]);
        const haSym = ha === "A" ? "@" : ha === "H" ? "vs" : "·";
        const reason = r.drop_reason || "(no reason recorded)";
        // Prefer first_pitch_ct (post-2026-05-03 schema); fall back to
        // first_pitch_et for older CSVs that haven't been re-graded yet.
        const firstPitch = pick(r, ["first_pitch_ct", "first_pitch_et"]);
        const pitchHtml = firstPitch
          ? `<span class="pitch-time" title="First pitch time">${firstPitch}</span>`
          : "";
        const edgeStr = r.edge ? fmtPct(r.edge) : "";
        const priceStr = r.over_price ? fmtPrice(r.over_price) : "";
        return `
          <div class="dropped-row">
            <div class="row-top">
              <span class="name">${name || "—"}</span>
              <span class="price">${priceStr}</span>
            </div>
            <div class="row-bot">
              <span>${team} ${haSym} ${opp}${pitchHtml}</span>
              <span>${edgeStr ? edgeStr + " edge (when picked)" : ""}</span>
            </div>
            <span class="reason">${reason}</span>
          </div>
        `;
      }).join("");
    }
    async function loadDropped(date) {
      // Only fetch if the manifest told us this date has a dropped file.
      // Avoids 404 spam on dates with no drops (the common case).
      if (!DROPPED_DATES.has(date)) {
        renderDropped(date, []);
        return;
      }
      try {
        const r = await fetch(droppedCsvUrlForDate(date), { cache: "no-cache" });
        if (!r.ok) {
          renderDropped(date, []);
          return;
        }
        const { rows } = parseCSV(await r.text());
        renderDropped(date, rows);
      } catch (e) {
        renderDropped(date, []);
      }
    }
    async function loadDate(date) {
      const url = csvUrlForDate(date);
      try {
        const r = await fetch(url, { cache: "no-cache" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const { rows } = parseCSV(await r.text());
        render(date, rows);
      } catch (e) {
        document.getElementById("meta").textContent = `couldn't load ${date}: ${e.message}`;
        document.getElementById("rows").innerHTML = "";
      }
      // Always try to load dropped picks (will no-op if none exist for date).
      loadDropped(date);
    }
    async function init() {
      let manifest;
      try {
        const r = await fetch(MANIFEST_URL, { cache: "no-cache" });
        manifest = await r.json();
      } catch (e) {
        document.getElementById("meta").textContent =
          "no manifest found — has the workflow run yet?";
        return;
      }
      // Capture the set of dates that have a dropped CSV so loadDropped
      // can avoid 404'ing on dates with no drops (the common case).
      DROPPED_DATES = new Set(manifest.dropped_dates || []);
      const sel = document.getElementById("datePicker");
      (manifest.dates || []).forEach((d) => {
        const o = document.createElement("option");
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      });
      const initial = manifest.latest || (manifest.dates || [])[0];
      if (!initial) {
        document.getElementById("meta").textContent =
          "no recommendations on file yet.";
        return;
      }
      sel.value = initial;
      sel.addEventListener("change", () => loadDate(sel.value));
      loadDate(initial);
    }
    init();
  </script>
</body>
</html>
